<!doctype html>
<html lang="de">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Fachverband Bauwerksdiagnostik e.V.</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Public+Sans:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <!-- Grain texture overlay -->
    <div style="position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:0.015; mix-blend-mode:multiply; width:100%; height:100%;">
      <svg width="100%" height="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <filter id="noise">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#noise)"/>
      </svg>
    </div>

    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (!endpoint || !websiteId || endpoint.includes("%") || websiteId.includes("%")) {
          return;
        }

        const script = document.createElement("script");
        script.defer = true;
        script.src = endpoint.replace(/\/$/, "") + "/umami";
        script.setAttribute("data-website-id", websiteId);
        document.body.appendChild(script);
      })();
    </script>
  </body>

</html>
